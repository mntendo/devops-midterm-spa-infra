name: Nightly Build

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
	- name: Checkout SOURCE repo
	uses: actions/checkout@v4
        with:
          repository: mntendo/docker-compose-react-nodejs-mysql
          path: source

      - name: Print test message
        run: echo "Nightly build workflow is running as scheduled"
